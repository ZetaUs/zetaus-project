<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Little Starlight</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: system-ui, sans-serif;
  }

  body {
    background: #0f1729;
    color: #e0e0e0;
    padding: 20px;
    max-width: 500px;
    margin: 0 auto;
  }

  .song-info {
    text-align: center;
    margin: 20px 0;
  }
  .song-title {
    font-size: 24px;
    font-weight: bold;
    margin-bottom: 6px;
  }
  .song-artist {
    font-size: 16px;
    color: #aaa;
  }

  .disc-box {
    display: flex;
    justify-content: center;
    margin: 30px 0;
  }
  .disc {
    width: 200px;
    height: 200px;
    border-radius: 50%;
    background: url('ZetaWave.png') center/cover;
    border: 8px solid #222;
    animation: rotate 22s linear infinite;
    animation-play-state: paused;
  }
  .disc.playing {
    animation-play-state: running;
  }
  @keyframes rotate {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }

  .player {
    background: #1b2238;
    padding: 25px;
    border-radius: 20px;
  }

  .play-btn {
    display: block;
    width: 100%;
    padding: 16px;
    margin: 10px 0 20px;
    font-size: 18px;
    font-weight: bold;
    background: #7289da;
    color: #fff;
    border: none;
    border-radius: 12px;
    cursor: pointer;
  }
  .play-btn:active {
    background: #5a6cb2;
  }

  .progress {
    width: 100%;
    height: 6px;
    background: #333;
    border-radius: 3px;
    margin: 15px 0;
    cursor: pointer;
  }
  .progress .bar {
    height: 100%;
    background: #7289da;
    width: 0%;
    border-radius: 3px;
  }

  .lrc-box {
    height: 260px;
    overflow: hidden;
    background: #161c30;
    border-radius: 14px;
    padding: 20px 10px;
  }
  .lrc-list {
    transition: transform 0.4s ease;
    text-align: center;
  }
  .lrc-line {
    padding: 10px 0;
    color: #777;
  }
  .lrc-line.active {
    color: #7289da;
    font-weight: bold;
    font-size: 17px;
  }
</style>
</head>
<body>

<div class="song-info">
  <div class="song-title">Little Starlight</div>
  <div class="song-artist">作曲：ZetaWave</div>
</div>

<div class="disc-box">
  <div class="disc" id="disc"></div>
</div>

<div class="player">
  <audio id="audio" src="Little Starlight.mp3">

  <button class="play-btn" id="playBtn" onclick="togglePlay()">▶️ 开始播放</button>

  <div class="progress" onclick="seek(event)">
    <div class="bar" id="bar"></div>
  </div>

  <div class="lrc-box">
    <div class="lrc-list" id="lrcList"></div>
  </div>
</div>

<script>
const audio = document.getElementById('audio');
const disc = document.getElementById('disc');
const playBtn = document.getElementById('playBtn');
const bar = document.getElementById('bar');
const lrcList = document.getElementById('lrcList');

let lrcLines = [];
let currentIndex = -1;

// 加载歌词
fetch('Little Starlight.lrc')
  .then(res => res.text())
  .then(text => parseLRC(text));

function parseLRC(text) {
  const lines = text.split('\n');
  lrcLines = [];
  lines.forEach(line => {
    const regex = /\[(\d{2}):(\d{2})\.(\d{2,3})\](sslocal://flow/file_open?url=.%2A&flow_extra=eyJsaW5rX3R5cGUiOiJjb2RlX2ludGVycHJldGVyIn0=)/;
    const match = line.match(regex);
    if (match) {
      const min = parseInt(match[1]);
      const sec = parseInt(match[2]);
      const ms = match[3].length === 2 ? parseInt(match[3])*10 : parseInt(match[3]);
      const time = min * 60 + sec + ms / 1000;
      const content = match[4].trim();
      if (content) lrcLines.push({ time, content });
    }
  });
  renderLRC();
}

function renderLRC() {
  lrcList.innerHTML = '';
  lrcLines.forEach(item => {
    const div = document.createElement('div');
    div.className = 'lrc-line';
    div.innerText = item.content;
    lrcList.appendChild(div);
  });
}

function togglePlay() {
  if (audio.paused) {
    audio.play();
    disc.classList.add('playing');
    playBtn.innerHTML = '⏸️ 暂停播放';
  } else {
    audio.pause();
    disc.classList.remove('playing');
    playBtn.innerHTML = '▶️ 开始播放';
  }
}

function seek(e) {
  const rect = bar.parentElement.getBoundingClientRect();
  const per = (e.clientX - rect.left) / rect.width;
  audio.currentTime = per * audio.duration;
}

audio.addEventListener('timeupdate', () => {
  if (!audio.duration) return;
  bar.style.width = (audio.currentTime / audio.duration * 100) + '%';

  let target = -1;
  for (let i = 0; i < lrcLines.length; i++) {
    if (audio.currentTime >= lrcLines[i].time) target = i;
  }

  if (target !== currentIndex && target !== -1) {
    currentIndex = target;
    syncLRC();
  }
});

function syncLRC() {
  document.querySelectorAll('.lrc-line').forEach((el, i) => {
    el.classList.toggle('active', i === currentIndex);
  });
  const lineHeight = 44;
  const offset = lrcList.clientHeight / 2 - lineHeight / 2;
  lrcList.style.transform = `translateY(-${currentIndex * lineHeight - offset}px)`;
}

audio.addEventListener('ended', () => {
  disc.classList.remove('playing');
  playBtn.innerHTML = '▶️ 开始播放';
});
</script>
</body>
</html>
