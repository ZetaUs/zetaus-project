<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZetaUs Project</title>

<!-- 👇 这行就是标签页图标，用你同目录的 ZetaWave.png -->
<link rel="icon" href="ZetaWave.png" type="image/png">

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        width: 100vw;
        height: 100vh;
        background: #000;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-family: sans-serif;
        overflow: hidden;
    }

    .logo {
        width: 160px;
        height: 160px;
        border-radius: 24px;
        object-fit: cover;
        margin-bottom: 50px;
        box-shadow: 0 0 60px #4cf;
        animation: glow 3s infinite alternate;
    }

    @keyframes glow {
        from { box-shadow: 0 0 40px #44ccff70; }
        to { box-shadow: 0 0 80px #44ccffaa; }
    }

    .enter-btn {
        padding: 16px 60px;
        font-size: 18px;
        font-weight: bold;
        color: #fff;
        background: linear-gradient(135deg, #4cf, #86f);
        border: none;
        border-radius: 50px;
        cursor: pointer;
        box-shadow: 0 0 40px #4cf8;
        transition: all 0.3s ease;
    }

    .enter-btn:hover {
        transform: scale(1.05);
        box-shadow: 0 0 70px #4cf;
    }

    .enter-btn:active {
        transform: scale(0.98);
    }
</style>
</head>

<body>
    <img src="ZetaWave.png" class="logo" alt="ZetaWave">
    <button class="enter-btn">进入页面</button>

<script>
    document.querySelector('.enter-btn').onclick = () => {
        document.body.style.opacity = 0;
        setTimeout(() => {
            location.href = "./GlqlQjUOQSBgS0xUXdUcb1fUrc/";
        }, 300);
    };
</script>
</body>
</html>
