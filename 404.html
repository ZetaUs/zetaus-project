<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 页面未找到</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  width:100vw;
  height:100vh;
  background:#000;
  color:#fff;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  font-family:sans-serif
}

.title{
  font-size:80px;
  font-weight:bold;
  color:#4cf;
  margin-bottom:12px
}

.desc{
  font-size:18px;
  color:#aaa;
  margin-bottom:45px
}

.back-btn{
  padding:15px 50px;
  font-size:18px;
  font-weight:bold;
  color:#fff;
  background:linear-gradient(135deg,#4cf,#86f);
  border:none;
  border-radius:50px;
  cursor:pointer;
  box-shadow:0 0 40px #4cf8;
  transition:.3s
}

.back-btn:hover{
  transform:scale(1.05);
  box-shadow:0 0 70px #4cf
}

.back-btn:active{
  transform:scale(.98)
}
</style>
</head>

<body>
  <div class="title">404</div>
  <div class="desc">页面不存在或已丢失</div>
  <button class="back-btn" onclick="location.href='./'">返回主页</button>

<script>
setTimeout(()=>{location.href='./'},5000)
</script>
</body>
</html>
